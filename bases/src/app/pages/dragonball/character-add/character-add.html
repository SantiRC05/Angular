<style>
  h3{
    color: #26b837;
  }

</style>


    <h3>Agregar: {{name ()}}</h3>


    <input type="text"
    class="form-control"
    placeholder="Nombre"
    [value]="name()"
    (change)="name.set(txtName.value)"
    (input)="name.set(txtName.value)"
    #txtName
    >

    <input
    type="number"
    class="form-control mt-2"
    placeholder="Poder"
    [value]="power()"
    (input)="power.set(+txtPower.value)"
    #txtPower
    >

    <button (click)="addCharacter()" class="mt-2 btn btn-primary">
      Agregar
    </button>
